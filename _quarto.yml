project:
  type: book
  output-dir: _book

book:
  title: "Applied Financial Econometrics with R"
  subtitle: "Forecasting, volatility, and asset-pricing models"
  author: "Dr. Martín Lozano"
  page-navigation: true
  search: true
  date: today
  date-format: "MMMM D, YYYY"
  sidebar:
    style: docked
    collapse-level: 1
  page-footer:
    left: "Applied Financial Econometrics with R"
    right: 'Dr. Martín Lozano &middot; <a href="mailto:mlozanoqf@gmail.com">mlozanoqf@gmail.com</a> &middot; <a href="https://mlozanoqf.github.io/">mlozanoqf.github.io</a>'
  chapters:
    - text: "Applied Financial Econometrics with R"
      href: index.qmd
    - text: "Forecasting with fpp3"
      href: 01-forecasting-with-fpp3.qmd
    - text: "Time series forecasting with machine learning"
      href: 02-forecasting-with-machine-learning.qmd
    - text: "GARCH volatility forecasting"
      href: 03-garch-volatility.qmd
    - text: "Asset pricing econometrics"
      href: 04-asset-pricing-econometrics.qmd
    - references.qmd

bibliography: references.bib
link-citations: true

crossref:
  chapters: true

execute:
  warning: false
  message: false
  freeze: auto

format:
  html:
    theme:
      light: flatly
      dark: darkly
    toc: false
    toc-title: "On this page"
    toc-location: right
    toc-depth: 2
    smooth-scroll: true
    code-fold: true
    code-copy: true
    code-tools:
      toggle: true
      source: false
    code-block-bg: true
    code-block-border-left: "#31BAE9"
    code-line-numbers: true
    number-sections: true
    number-depth: 2
    page-layout: full
    include-after-body:
      - analytics_emf.html
      - back-to-top.html
      - progressbar.html
      - sidebar-toggle.html
      - local-navigation.html
      - page-sections.html
      - sidebar-accordion.html
      - sidebar-chapter-sections.html
    css: styles.css
